<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dash</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00fff2; font-size: 24px; text-shadow: 0 0 10px #00fff2; }
    </style>
</head>
<body>

<div id="ui">Distance: 0m</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- Game Settings ---
    const gravity = 0.7;
    const jumpPower = -14;
    const playerSpeed = 7;
    const cubeSize = 40;

    let gameActive = true;
    let distance = 0;
    let cameraX = 0;

    // --- Objects ---
    const player = {
        x: 100, y: 300, w: cubeSize, h: cubeSize,
        dy: 0, rotation: 0, onGround: false, color: '#00fff2'
    };

    // Initial starting floor
    let platforms = [
        { x: 0, y: 500, w: 800, h: 400 },
        { x: 900, y: 400, w: 300, h: 500 },
        { x: 1300, y: 300, w: 400, h: 600 },
        { x: 1850, y: 450, w: 500, h: 500 }
    ];

    function spawnPlatforms() {
        const lastPlat = platforms[platforms.length - 1];
        if (lastPlat.x - cameraX < canvas.width + 500) {
            const gap = 120 + Math.random() * 150;
            const width = 200 + Math.random() * 400;
            // Height variance (goes up and down)
            const yChange = (Math.random() - 0.5) * 300; 
            let newY = Math.max(200, Math.min(canvas.height - 100, lastPlat.y + yChange));
            
            platforms.push({ x: lastPlat.x + lastPlat.w + gap, y: newY, w: width, h: 1000 });
        }
    }

    function update() {
        if (!gameActive) return;

        // Clear Canvas
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Move Camera and Player
        player.x += playerSpeed;
        cameraX = player.x - 150;
        distance = Math.floor(player.x / 10);
        ui.innerText = `Distance: ${distance}m`;

        // Physics
        player.dy += gravity;
        player.y += player.dy;
        player.onGround = false;

        // Collision Detection
        ctx.save();
        ctx.translate(-cameraX, 0);

        // Draw Lava (the floor is lava!)
        ctx.fillStyle = '#ff3300';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff3300';
        ctx.fillRect(cameraX, canvas.height - 20, canvas.width, 20);

        // Draw and Check Platforms
        ctx.fillStyle = '#333';
        ctx.strokeStyle = '#00fff2';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 0;

        platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeRect(p.x, p.y, p.w, p.h);

            // Top collision (landing)
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y + player.h > p.y && player.y + player.h < p.y + 30 && player.dy >= 0) {
                player.y = p.y - player.h;
                player.dy = 0;
                player.onGround = true;
            }
            // Side collision (hitting a wall = death)
            else if (player.x + player.w > p.x && player.x < p.x + 10 && player.y + player.h > p.y + 10) {
                gameOver();
            }
        });

        // Rotation logic
        if (!player.onGround) {
            player.rotation += 0.15;
        } else {
            // Snap rotation to nearest 90 degrees when landing
            player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
        }

        // Draw Player
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        ctx.rotate(player.rotation);
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
        ctx.restore();

        ctx.restore();

        // Death by falling
        if (player.y > canvas.height) gameOver();

        spawnPlatforms();
        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00fff2';
        ctx.font = 'bold 48px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('CRASHED!', canvas.width/2, canvas.height/2);
        ctx.font = '24px sans-serif';
        ctx.fillText('Press SPACE to Try Again', canvas.width/2, canvas.height/2 + 60);
    }

    function restart() {
        player.x = 100;
        player.y = 300;
        player.dy = 0;
        player.rotation = 0;
        platforms = [
            { x: 0, y: 500, w: 800, h: 400 },
            { x: 900, y: 400, w: 300, h: 500 },
            { x: 1300, y: 300, w: 400, h: 600 }
        ];
        gameActive = true;
        update();
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (gameActive && player.onGround) {
                player.dy = jumpPower;
                player.onGround = false;
            } else if (!gameActive) {
                restart();
            }
        }
    });

    // Handle Window Resize
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    update();
</script>
</body>
</html>
